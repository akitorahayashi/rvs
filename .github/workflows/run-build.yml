# Build Workflow
#
# Compiles the Bun CLI into standalone executables.

name: Run Build

on:
  workflow_call:
    inputs:
      release_id:
        required: false
        type: string

jobs:
  build:
    name: Build
    if: inputs.release_id == ''
    permissions:
      contents: read
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Setup Development Environment
        uses: ./.github/actions/setup

      - name: Build Bun CLI
        run: bun run build

  build-release:
    name: Build ${{ matrix.target }}
    if: inputs.release_id != ''
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: bun-linux-x64
            artifact: bun-cli-linux-x64
          - target: bun-linux-arm64
            artifact: bun-cli-linux-arm64
          - target: bun-darwin-x64
            artifact: bun-cli-darwin-x64
          - target: bun-darwin-arm64
            artifact: bun-cli-darwin-arm64

    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Setup Development Environment
        uses: ./.github/actions/setup

      - name: Build Bun CLI
        run: bun build src/bun_cli/main.ts --compile --target=${{ matrix.target }} --outfile=${{ matrix.artifact }}

      - name: Upload Release Asset
        uses: akitorahayashi/gh-release@v1
        with:
          mode: upload
          token: ${{ github.token }}
          release_id: ${{ inputs.release_id }}
          files: ${{ matrix.artifact }}
          overwrite: true
